services:
  dev:
    build:
      context: ../
      dockerfile: .devcontainer/Dockerfile
    environment:
      - ENV=development
      - USE_BAZEL_VERSION=9.1.0
      # Services connect as the least-privilege `flow` role so RLS is enforced
      # (ADR-0011). Migrations auto-use MIGRATION_DATABASE_URL (the owner) — see
      # migrations/env.py — so DDL/role setup keeps working.
      - DATABASE_URL=postgresql+asyncpg://flow:flow@postgres:5432/freightmate
      - MIGRATION_DATABASE_URL=postgresql+asyncpg://freightmate:freightmate@postgres:5432/freightmate
      - REDIS_URL=redis://redis:6379/0
      - TEMPORAL_ADDRESS=temporal:7233
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    volumes:
      - ../:/workspaces/fm-flow
      - ~/.ssh:/home/vscode/.ssh
      - ~/.gitconfig:/home/vscode/.gitconfig
      - ~/.claude:/home/vscode/.claude
      - ~/.claude.json:/home/vscode/.claude.json
      - ~/.bash_history:/home/vscode/.bash_history
      - ~/.zsh_history:/home/vscode/.zsh_history
      - ~/.aws:/home/vscode/.aws
      - bazel_cache:/home/vscode/.cache/bazel
      - bazelisk_cache:/home/vscode/.cache/bazelisk
      - vscode-server:/home/vscode/.vscode-server
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - freightmate
    command: sleep infinity

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=freightmate
      - POSTGRES_PASSWORD=freightmate
      - POSTGRES_DB=freightmate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - freightmate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freightmate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot init container: applies every *.sql in postgres-init/ (sorted), then
  # exits. The postgres /docker-entrypoint-initdb.d hook only runs on a *fresh*
  # data dir, so this re-applies them on every `up` — drop new idempotent scripts
  # into the folder and they run automatically. `dev` waits on it.
  db-init:
    image: postgres:17
    environment:
      - PGPASSWORD=freightmate
    volumes:
      - ./postgres-init:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    # `command` MUST be a single-element list here: with an exec-form entrypoint,
    # a *string* command gets word-split and each word appended as its own arg, so
    # `sh -c` would receive only "for" as its script (hence "Bad for loop variable").
    command:
      - |
        for f in /scripts/*.sql; do
          echo "db-init: applying $$f"
          psql -h postgres -U freightmate -d freightmate -v ON_ERROR_STOP=1 -f "$$f" || exit 1
        done
    restart: "no"
    networks:
      - freightmate

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    networks:
      - freightmate
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=freightmate
      - POSTGRES_PWD=freightmate
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - freightmate
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - freightmate

  localstack:
    image: localstack/localstack:latest
    environment:
      - SERVICES=s3,kms,secretsmanager
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      - freightmate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  bazel_cache:
  bazelisk_cache:
  vscode-server:
  postgres_data:
  redis_data:
  localstack_data:

networks:
  freightmate:
    external: true
