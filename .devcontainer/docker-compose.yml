services:
  dev:
    build:
      context: ../
      dockerfile: .devcontainer/Dockerfile
    environment:
      - ENV=development
      - USE_BAZEL_VERSION=9.1.0
      - DATABASE_URL=postgres://freightmate:freightmate@postgres:5432/freightmate
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../:/workspaces/fm-flow
      - ~/.ssh:/home/vscode/.ssh
      - ~/.gitconfig:/home/vscode/.gitconfig
      - ~/.claude:/home/vscode/.claude
      - ~/.claude.json:/home/vscode/.claude.json
      - ~/.bash_history:/home/vscode/.bash_history
      - ~/.zsh_history:/home/vscode/.zsh_history
      - bazel_cache:/home/vscode/.cache/bazel
      - bazelisk_cache:/home/vscode/.cache/bazelisk
      - vscode-server:/home/vscode/.vscode-server
    networks:
      - freightmate
    command: sleep infinity

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=freightmate
      - POSTGRES_PASSWORD=freightmate
      - POSTGRES_DB=freightmate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - freightmate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freightmate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    networks:
      - freightmate
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


volumes:
  bazel_cache:
  bazelisk_cache:
  vscode-server:
  postgres_data:
  redis_data:

networks:
  freightmate:
    external: true
